<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXTREME GOLF LOADING</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:monospace;text-align:center}
canvas{display:block;margin:0 auto;background:#000;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c" width="640" height="360"></canvas>
<script>
const c=document.getElementById('c');
const x=c.getContext('2d');

let t=0;

// -------- AUDIO (80s MIDI STYLE) --------
const AC=window.AudioContext||window.webkitAudioContext;
const ac=new AC();
function note(f,d,type='square',v=0.05){
 let o=ac.createOscillator(),g=ac.createGain();
 o.type=type;o.frequency.value=f;g.gain.value=v;
 o.connect(g);g.connect(ac.destination);
 o.start();o.stop(ac.currentTime+d);
}
function music(){
 const lead=[440,554,660,880,660,554];
 const bass=[110,110,165,110];
 let i=0;
 setInterval(()=>{
  note(lead[i%lead.length],0.1,'square',0.06);
  note(bass[i%bass.length],0.15,'triangle',0.04);
  i++;
 },140);
}
window.addEventListener('click',()=>{if(ac.state!=='running')ac.resume();music();},{once:true});

// -------- FIRE TEXT --------
function drawFireText(text,xp,yp){
 for(let i=0;i<text.length;i++){
  let char=text[i];
  let flameOffset=Math.sin(t*0.2+i)*5;
  x.fillStyle='orange';
  x.fillText(char,xp+i*16,yp+flameOffset);
  x.fillStyle='red';
  x.fillText(char,xp+i*16,yp+flameOffset-4);
 }
}

// -------- CHARACTER (PIXEL FIGHTER GOLFER) --------
function drawCharacter(){
 let px=280,py=180;

 // body
 x.fillStyle='#ffcc00';
 x.fillRect(px,py,20,20);

 // head
 x.fillStyle='#ffe0bd';
 x.fillRect(px+4,py-12,12,12);

 // hair (spiky anime)
 x.fillStyle='#ff0000';
 x.fillRect(px+2,py-18,4,6);
 x.fillRect(px+10,py-18,4,6);

 // arms (flex pose)
 x.fillStyle='#ffcc00';
 x.fillRect(px-6,py+4,6,4);
 x.fillRect(px+20,py+4,6,4);

 // golf club (dramatic)
 x.fillStyle='#aaa';
 x.fillRect(px+22,py-10,3,30);
}

// -------- LOOP --------
function loop(){
 t++;
 x.clearRect(0,0,640,360);

 // background flicker
 x.fillStyle='rgb('+Math.floor(20+Math.sin(t*0.3)*20)+',0,0)';
 x.fillRect(0,0,640,360);

 // title
 x.font='20px monospace';
 drawFireText('EXTREME GOLF',140,100);

 x.font='14px monospace';
 x.fillStyle='#fff';
 x.fillText('SPIRIT DRIVE LOADING...',200,300);

 // character
 drawCharacter();

 // loading bar
 x.fillStyle='#333';
 x.fillRect(120,320,400,10);
 x.fillStyle='#0f0';
 x.fillRect(120,320,(t%400),10);

 requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
