<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<title>Super Golf Challenge: Spirit Drive</title>
<style>
body{margin:0;background:#08140c;color:#fff;font-family:monospace;text-align:center}
canvas{display:block;margin:10px auto;border:6px solid #111;image-rendering:pixelated}
#dialog{height:40px}
</style>
</head>
<body>
<h1>SUPER GOLF CHALLENGE: SPIRIT DRIVE</h1>
<canvas id="c" width="640" height="360"></canvas>
<div id="dialog"></div>
<script>
const c=document.getElementById('c');
const x=c.getContext('2d');
const dialog=document.getElementById('dialog');let state='loading'; let t=0;

// ---------- AUDIO ---------- const AC=window.AudioContext||window.webkitAudioContext; const ac=new AC(); function beep(f,d,type='square',v=0.05){let o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);} function music(){const lead=[659,784,988,784];let i=0;setInterval(()=>beep(lead[i++%lead.length],0.1),150);} window.addEventListener('click',()=>{if(ac.state!=='running')ac.resume();music();},{once:true});

// ---------- STORY ---------- const story=[ "A stormy morning... destiny calls.", "OLD PRO: 'My back... it's over... kid... take my place...'"," "YOU: 'Me? But I'm just a weekend golfer!'"," "OLD PRO: 'NO... YOU HAVE THE SWING OF DESTINY.'", "THE LEGENDARY TOURNAMENT AWAITS..." ]; let storyIndex=0;

// ---------- PLAYER ---------- let player={name:'HIKARU',power:1.0,control:1.0,spirit:100};

// ---------- BALL ---------- let ball={x:100,y:260,vx:0,vy:0}; let camX=0;

// ---------- WIND ---------- let wind={speed:(Math.random()*2-1)};

// ---------- SWING SYSTEM ---------- let power=0,dir=1; let accuracy=0,accDir=1; let phase='power'; let charging=false;

// ---------- INPUT ---------- c.onmousedown=()=>{if(state==='range')charging=true;}; c.onmouseup=()=>{ if(state==='range'&&charging){ if(phase==='power'){phase='accuracy';} else{shoot();charging=false;phase='power';} } };

function shoot(){ let p=power/100; let a=accuracy/100; let error=Math.abs(0.5-a); let spiritBoost=player.spirit/100;

ball.vx=p20(1-error)spiritBoost; ball.vy=-p10*(1-error); player.spirit-=10;

dialog.innerText="HIKARU: 'SPIRIT DRIVE!!!'"; beep(300+500*p,0.15); }

// ---------- UPDATE ---------- function update(){ t++; if(state==='loading'&&t>120)state='story';

if(state==='story'){ dialog.innerText=story[storyIndex]; }

if(state==='range'){ if(charging){ if(phase==='power'){power+=dir3;if(power>=100||power<=0)dir=-1;} else{accuracy+=accDir4;if(accuracy>=100||accuracy<=0)accDir=-1;} }

ball.x+=ball.vx+wind.speed; ball.y+=ball.vy; ball.vx*=0.99; ball.vy*=0.99; camX=ball.x-120; } }

// ---------- DRAW ---------- function draw(){ x.clearRect(0,0,640,360);

if(state==='loading'){ x.fillStyle='#000';x.fillRect(0,0,640,360); x.fillStyle='#0f0';x.fillText('LOADING...',260,180); return; }

if(state==='story'){ x.fillStyle='#112';x.fillRect(0,0,640,360); x.fillStyle='#fff'; x.fillText('CLICK TO ADVANCE STORY',200,200); c.onclick=()=>{storyIndex++;if(storyIndex>=story.length){state='range';c.onclick=null;} }; return; }

if(state==='range'){ // sky x.fillStyle='#6ec6ff';x.fillRect(0,0,640,120);

// ground stripes for(let i=0;i<240;i+=4){ x.fillStyle='rgb(0,'+(120+i/4)+',0)'; x.fillRect(0,120+i,640,4); }

x.save(); x.translate(-camX,0);

// ball x.fillStyle='#fff'; x.beginPath();x.arc(ball.x,ball.y,5,0,Math.PI*2);x.fill();

// player x.fillStyle='#ff0'; x.fillRect(80,250,10,10);

x.restore();

// HUD x.fillStyle='#fff'; x.fillText('WIND '+wind.speed.toFixed(2),10,20); x.fillText('DIST '+Math.floor(ball.x-100)+' m',500,20); x.fillText('SPIRIT '+player.spirit,10,40);

// power bar x.fillStyle='#000';x.fillRect(200,320,240,10); x.fillStyle='#f00';x.fillRect(200,320,power*2.4,10);

if(phase==='accuracy'){ x.fillStyle='#00f';x.fillRect(200,335,accuracy*2.4,8); } } }

function loop(){update();draw();requestAnimationFrame(loop);}loop(); </script>

</body>
</html>
