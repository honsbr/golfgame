<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<title>NES Golf Retro</title>
<style>
  body {
    margin: 0;
    background: #0b2a0f;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
  }
  canvas {
    background: #2e7d32;
    display: block;
    margin: 20px auto;
    border: 4px solid #111;
    image-rendering: pixelated;
  }
  h1 {
    font-size: 18px;
    letter-spacing: 2px;
  }
</style>
</head>
<body><h1>NES GOLF: TURBO FAIRWAY 198X</h1>
<canvas id="game" width="640" height="360"></canvas>
<p>Click + drag opposite direction to shoot</p><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const hole = { x: 520, y: 180, r: 10 };
const players = [
  { name: "BIFF", x: 80, y: 260, color: "#ff0044" },
  { name: "TURBO", x: 120, y: 260, color: "#00e5ff" }
];

let ball = { x: 80, y: 260, vx: 0, vy: 0 };
let aiming = false;
let mouse = { x: 0, y: 0 };

const friction = 0.985;
const power = 0.18;

// ---------- RETRO AUDIO ENGINE ----------
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioCtx();

function beep(freq, time, type="square") {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = 0.05;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + time);
}

function playTheme() {
  const notes = [440, 660, 880, 660, 440, 330];
  let i = 0;
  setInterval(() => {
    beep(notes[i % notes.length], 0.1);
    i++;
  }, 180);
}

// start audio on interaction
window.addEventListener("click", () => {
  if (audioCtx.state !== "running") audioCtx.resume();
  playTheme();
}, { once: true });

// ---------- INPUT ----------
canvas.addEventListener("mousemove", (e) => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});

canvas.addEventListener("mousedown", () => aiming = true);

canvas.addEventListener("mouseup", () => {
  if (!aiming) return;

  const dx = ball.x - mouse.x;
  const dy = ball.y - mouse.y;

  ball.vx = dx * power;
  ball.vy = dy * power;

  beep(220 + Math.random()*200, 0.08);
  aiming = false;
});

// ---------- GAME LOOP ----------
function update() {
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vx *= friction;
  ball.vy *= friction;

  if (Math.abs(ball.vx) < 0.01) ball.vx = 0;
  if (Math.abs(ball.vy) < 0.01) ball.vy = 0;

  // hole check
  const dx = ball.x - hole.x;
  const dy = ball.y - hole.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  draw();

  if (dist < hole.r) {
    beep(880, 0.2);
    beep(1320, 0.2);
  }

  requestAnimationFrame(update);
}

function draw() {
  // background grid (NES vibe)
  ctx.fillStyle = "#2e7d32";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(0,0,0,0.08)";
  for (let i = 0; i < 20; i++) {
    ctx.fillRect(i*32, 0, 1, canvas.height);
    ctx.fillRect(0, i*18, canvas.width, 1);
  }

  // hole
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, hole.r, 0, Math.PI*2);
  ctx.fill();

  // ball
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 6, 0, Math.PI*2);
  ctx.fill();

  // aiming line
  if (aiming) {
    ctx.strokeStyle = "#ff0";
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(mouse.x, mouse.y);
    ctx.stroke();
  }

  // players
  players.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 10, 10);
    ctx.fillStyle = "#000";
    ctx.fillText(p.name, p.x - 10, p.y - 5);
  });

  // HUD
  ctx.fillStyle = "#00ffcc";
  ctx.fillText("NES GOLF // 198X EDITION", 10, 20);
}

update();
</script></body>
</html>
