<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Piss Deluxe</title>
<style>
body { margin:0; background:#111; overflow:hidden; }
canvas {
  display:block;
  margin:auto;
  position:absolute;
  top:0; bottom:0; left:0; right:0;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const g = c.getContext("2d");

const W = 800, H = 450;
c.width = W;
c.height = H;

// ─── SINGLE IMAGE ───────────────────
const img = new Image();
img.src = "https://honsbr.github.io/golfgame/golf8.png";

// ─── STATE ─────────────────────────
let state = "title";
let t = 0;
let piss = 0;
let wardenX = 820;

// ─── INPUT ─────────────────────────
c.addEventListener("pointerdown", () => {
  if (state === "title") {
    reset();
  } else if (state === "play") {
    piss += 10;
  } else {
    state = "title";
  }
});

// ─── RESET ─────────────────────────
function reset() {
  state = "play";
  piss = 0;
  wardenX = 820;
  t = 0;
}

// ─── UPDATE ────────────────────────
function update(dt) {
  t += dt;

  if (state === "play") {
    wardenX -= 140 * dt;

    if (wardenX < 520) state = "lose";
    if (piss >= 100) state = "win";
  }
}

// ─── DRAW ──────────────────────────
function draw() {
  g.clearRect(0,0,W,H);

  // Always draw base image
  g.drawImage(img,0,0,W,H);

  // TITLE overlay
  if (state === "title") {
    const pulse = 0.5 + Math.abs(Math.sin(t*4))*0.5;
    g.globalAlpha = pulse;
    g.fillStyle = "#fff";
    g.font = "bold 36px Impact";
    g.textAlign = "center";
    g.fillText("TAP TO START", W/2, H-40);
    g.globalAlpha = 1;
    return;
  }

  // WIN
  if (state === "win") {
    g.fillStyle = "rgba(0,0,0,0.6)";
    g.fillRect(0,0,W,H);

    g.fillStyle = "#0f0";
    g.font = "bold 50px Impact";
    g.textAlign = "center";
    g.fillText("ESCAPED!", W/2, H/2);

    drawReplay();
    return;
  }

  // LOSE
  if (state === "lose") {
    g.fillStyle = "rgba(0,0,0,0.6)";
    g.fillRect(0,0,W,H);

    g.fillStyle = "#f00";
    g.font = "bold 50px Impact";
    g.textAlign = "center";
    g.fillText("CAUGHT!", W/2, H/2);

    drawReplay();
    return;
  }

  // ── GAMEPLAY OVERLAY ──

  // fake piss stream
  if (piss > 0) {
    g.strokeStyle = "yellow";
    g.lineWidth = 4;
    g.beginPath();
    g.moveTo(280,290);
    g.quadraticCurveTo(310,330,350,300);
    g.stroke();
  }

  // warden indicator (since baked in image)
  g.fillStyle = "red";
  g.fillRect(wardenX, 180, 20, 120);

  // piss bar
  g.fillStyle = "#000";
  g.fillRect(20,400,300,20);
  g.fillStyle = "yellow";
  g.fillRect(20,400,piss*3,20);

  // danger bar
  const d = Math.max(0,(wardenX-520)/300);
  g.fillStyle = d>0.5 ? "#0f0" : d>0.2 ? "#ff0" : "#f00";
  g.fillRect(20,370,300*d,10);

  // prompt
  g.fillStyle = "#fff";
  g.font = "bold 20px Impact";
  g.fillText("TAP FAST!", 600,420);
}

function drawReplay() {
  const pulse = 0.5 + Math.abs(Math.sin(t*4))*0.5;
  g.globalAlpha = pulse;
  g.fillStyle = "#fff";
  g.font = "bold 28px Impact";
  g.fillText("TAP TO PLAY AGAIN", W/2, H-30);
  g.globalAlpha = 1;
}

// ─── LOOP ──────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last)/1000, 0.05);
  last = ts;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

img.onload = () => {
  requestAnimationFrame(loop);
};
</script>
</body>
</html>
