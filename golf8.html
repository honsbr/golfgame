<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Piss Deluxe</title>
<style>
body { margin:0; background:#111; overflow:hidden; }
canvas {
  display:block;
  margin:auto;
  position:absolute;
  top:0; bottom:0; left:0; right:0;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const g = c.getContext("2d");

const W = 800, H = 450;
c.width = W;
c.height = H;

// ─── ASSETS ─────────────────────────
const ASSETS = {
  title: "assets/title.png",
  bg: "assets/bg.png",
  hydrant: "assets/hydrant.png",
  dog: "assets/dog_pee.png",
  warden: "assets/warden_walk.png",
  win: "assets/win.png",
  lose: "assets/lose.png"
};

const img = {};
let loaded = 0;
const total = Object.keys(ASSETS).length;

for (let k in ASSETS) {
  img[k] = new Image();
  img[k].src = ASSETS[k];
  img[k].onload = () => {
    loaded++;
    if (loaded === total) start();
  };
}

// ─── STATE ──────────────────────────
let state = "title";
let t = 0;
let piss = 0;
let wardenX = 820;
let flash = 0;

// ─── INPUT ──────────────────────────
c.addEventListener("pointerdown", () => {
  flash = 0.15;

  if (state === "title") {
    reset();
  } else if (state === "play") {
    piss += 8;
  } else {
    state = "title";
  }
});

// ─── GAME LOGIC ─────────────────────
function reset() {
  state = "play";
  piss = 0;
  wardenX = 820;
  t = 0;
}

function update() {
  t += 0.016;

  if (state === "play") {
    wardenX -= 1.2;

    if (wardenX < 520) state = "lose";
    if (piss >= 100) state = "win";
  }

  if (flash > 0) flash -= 0.016;
}

// ─── DRAW ───────────────────────────
function draw() {
  g.clearRect(0,0,W,H);

  // TITLE
  if (state === "title") {
    g.drawImage(img.title,0,0,W,H);

    const pulse = 0.5 + Math.abs(Math.sin(t * 4)) * 0.5;

    g.globalAlpha = pulse;
    g.fillStyle = "#fff";
    g.font = "bold 36px Impact";
    g.textAlign = "center";
    g.fillText("TAP TO START", W/2, H - 40);
    g.globalAlpha = 1;

    return;
  }

  // WIN / LOSE
  if (state === "win") {
    g.drawImage(img.win,0,0,W,H);
    drawReplay();
    return;
  }

  if (state === "lose") {
    g.drawImage(img.lose,0,0,W,H);
    drawReplay();
    return;
  }

  // GAMEPLAY
  g.drawImage(img.bg,0,0,W,H);

  // hydrant
  g.drawImage(img.hydrant,320,200,80,120);

  // piss stream
  if (piss > 0) {
    g.strokeStyle = "yellow";
    g.lineWidth = 4;
    g.beginPath();
    g.moveTo(280,290);
    g.quadraticCurveTo(310,330,350,300);
    g.stroke();
  }

  // dog
  g.drawImage(img.dog,150,200,180,180);

  // warden
  g.drawImage(img.warden,wardenX,200,160,200);

  // piss bar
  g.fillStyle = "#000";
  g.fillRect(20,400,300,20);
  g.fillStyle = "yellow";
  g.fillRect(20,400,piss*3,20);

  // danger bar
  const d = (wardenX - 520)/300;
  g.fillStyle = d>0.5 ? "#0f0" : d>0.2 ? "#ff0" : "#f00";
  g.fillRect(20,370,300*d,10);

  // prompt
  g.fillStyle = "#fff";
  g.font = "bold 20px Impact";
  g.fillText("TAP FAST!", 600,420);

  // tap flash
  if (flash > 0) {
    g.fillStyle = `rgba(255,255,255,${flash})`;
    g.fillRect(0,0,W,H);
  }
}

function drawReplay() {
  const pulse = 0.5 + Math.abs(Math.sin(t * 4)) * 0.5;

  g.globalAlpha = pulse;
  g.fillStyle = "#fff";
  g.font = "bold 28px Impact";
  g.textAlign = "center";
  g.fillText("TAP TO PLAY AGAIN", W/2, H - 30);
  g.globalAlpha = 1;
}

// ─── LOOP ───────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function start() {
  loop();
}

</script>
</body>
</html>
