<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dog Piss Deluxe</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden;
  touch-action:none; user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent; }
canvas { display:block; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════
//  DOG PISS DELUXE — Single sprite sheet game
//  Sheet: 1536x1024
// ═══════════════════════════════════════════════

// Sprite sheet rectangles [x, y, w, h] on the 1536x1024 sheet
const SP = {
  title:        [0,    156, 488, 308],
  win:          [496,  156, 517, 308],
  lose:         [1026, 156, 510, 308],
  bg:           [0,    505, 560, 230],
  hydrant:      [562,  505, 280, 230],
  dog_idle:     [842,  505, 340, 230],
  dog_pee:      [1185, 505, 350, 230],
  dog_run:      [120,  736, 360, 288],
  warden_walk:  [530,  736, 290, 288],
  dog_walk:     [810,  736, 280, 288],
  warden_angry: [1110, 736, 310, 288],
};

const sheet = new Image();
sheet.src = 'https://honsbr.github.io/golfgame/golf8.png';

// ── Canvas setup ──────────────────────────────
const canvas = document.getElementById('c');
const g = canvas.getContext('2d');
const LW = 800, LH = 450;

function resize() {
  const s = Math.min(window.innerWidth/LW, window.innerHeight/LH);
  canvas.width  = Math.round(LW*s);
  canvas.height = Math.round(LH*s);
  canvas.style.width  = canvas.width+'px';
  canvas.style.height = canvas.height+'px';
}
resize();
window.addEventListener('resize', resize);
function applyScale(){ g.setTransform(canvas.width/LW,0,0,canvas.height/LH,0,0); }

// ── Draw from sprite sheet ─────────────────────
// spr: key in SP, dx/dy: dest pos, dw/dh: dest size (optional, defaults to src size)
function spr(key, dx, dy, dw, dh, flipX) {
  if (!sheet.complete || !sheet.naturalWidth) return;
  const [sx,sy,sw,sh] = SP[key];
  const destW = dw !== undefined ? dw : sw;
  const destH = dh !== undefined ? dh : sh;
  g.save();
  if (flipX) {
    g.translate(dx + destW, dy);
    g.scale(-1, 1);
    g.drawImage(sheet, sx, sy, sw, sh, 0, 0, destW, destH);
  } else {
    g.drawImage(sheet, sx, sy, sw, sh, dx, dy, destW, destH);
  }
  g.restore();
}

// Draw sprite centred on cx,cy at given width (height auto-scaled)
function sprC(key, cx, cy, dw, flipX) {
  const [,, sw, sh] = SP[key];
  const dh = (sh/sw) * dw;
  spr(key, cx - dw/2, cy - dh/2, dw, dh, flipX);
}

// ── Audio ──────────────────────────────────────
let AC;
function getAC(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq,type,dur,vol=0.25,delay=0){
  try{
    const a=getAC(),o=a.createOscillator(),gn=a.createGain();
    o.connect(gn);gn.connect(a.destination);
    o.type=type;o.frequency.value=freq;
    gn.gain.setValueAtTime(0,a.currentTime+delay);
    gn.gain.linearRampToValueAtTime(vol,a.currentTime+delay+0.01);
    gn.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur+0.05);
  }catch(e){}
}
function sfxTap()  { beep(900,'square',0.03,0.15); beep(1300,'square',0.02,0.1,0.03); }
function sfxWin()  { [523,659,784,1047].forEach((f,i)=>beep(f,'square',0.15,0.2,i*0.09)); }
function sfxLose() { [300,220,160,100].forEach((f,i)=>beep(f,'sawtooth',0.18,0.22,i*0.08)); }
function sfxAlarm(){ beep(880,'square',0.05,0.28); beep(660,'square',0.05,0.22,0.07); }

// ── States ─────────────────────────────────────
const S={TITLE:0,CIN_EYES:1,CIN_HYDRANT:2,CIN_WALK:3,CIN_PEENOW:4,PEE:5,WIN:6,LOSE:7};
let state=S.TITLE,t=0,dt=0,last=0,diff=1.0;

// ── Game vars ──────────────────────────────────
let piss=0, cleanerX=0, dogWalkX=-160, escapeX=0, resultTimer=0;
let shakeAmt=0, particles=[], legPhase=0, alarmTimer=0;

// Layout positions (logical 800x450)
const DOG_X=130, DOG_Y=190;     // dog peeing position (top-left of sprite)
const HYD_X=330, HYD_Y=185;     // hydrant position
const W_ARRIVE=500, W_START=LW+100;
const W_SPEED=(W_START-W_ARRIVE)/8.0;  // 8 seconds to arrive

// ── Input ──────────────────────────────────────
canvas.addEventListener('pointerdown',e=>{e.preventDefault();onTap();});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();onTap();}
});

function onTap(){
  getAC();
  if(state===S.TITLE){go(S.CIN_EYES);return;}
  if(state>=S.CIN_EYES&&state<=S.CIN_PEENOW){skipToGame();return;}
  if(state===S.PEE){peeTap();return;}
  if((state===S.WIN||state===S.LOSE)&&resultTimer>0.5) restart();
}
function go(s){state=s;t=0;}
function skipToGame(){piss=0;particles=[];cleanerX=W_START;go(S.PEE);}

function peeTap(){
  sfxTap();
  piss=Math.min(100,piss+11);
  shakeAmt=0.06;
  for(let i=0;i<5;i++) particles.push({
    x:DOG_X+148,y:DOG_Y+100,
    vx:5+Math.random()*6,vy:-4+Math.random()*5,
    life:0.28+Math.random()*0.2,age:0,r:2+Math.random()*4
  });
  if(piss>=100){escapeX=220;resultTimer=0;diff=Math.min(diff+0.15,3.5);sfxWin();go(S.WIN);}
}
function restart(){piss=0;particles=[];dogWalkX=-160;go(S.TITLE);}

// ── Update ─────────────────────────────────────
function update(){
  legPhase+=dt*9;
  if(state===S.CIN_EYES    && t>1.6) go(S.CIN_HYDRANT);
  if(state===S.CIN_HYDRANT && t>1.4) {dogWalkX=-160;go(S.CIN_WALK);}
  if(state===S.CIN_WALK){
    dogWalkX=Math.min(DOG_X, dogWalkX+240*dt);
    if(t>2.0) go(S.CIN_PEENOW);
  }
  if(state===S.CIN_PEENOW&&t>1.2){piss=0;particles=[];cleanerX=W_START;go(S.PEE);}
  if(state===S.PEE){
    cleanerX-=W_SPEED*diff*dt;
    if(cleanerX<=W_ARRIVE){sfxLose();resultTimer=0;go(S.LOSE);}
    if(shakeAmt>0) shakeAmt-=dt;
    alarmTimer-=dt;
    const prox=(cleanerX-W_ARRIVE)/(W_START-W_ARRIVE);
    if(alarmTimer<=0&&prox<0.35){sfxAlarm();alarmTimer=0.45;}
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.age+=dt;p.x+=p.vx*dt*55;p.y+=p.vy*dt*55;p.vy+=9*dt;
      if(p.age>=p.life)particles.splice(i,1);
    }
  }
  if(state===S.WIN) {resultTimer+=dt;escapeX-=330*dt;}
  if(state===S.LOSE){resultTimer+=dt;}
}

// ── UI helpers ─────────────────────────────────
function lbl(txt,x,y,fill,stroke,sz){
  g.save();g.textAlign='center';
  g.font=`bold ${sz||68}px Impact,Arial Black,sans-serif`;
  g.lineWidth=Math.max(6,sz/9);g.strokeStyle=stroke||'#111';g.strokeText(txt,x,y);
  g.fillStyle=fill||'#FFD700';g.fillText(txt,x,y);g.restore();
}

function vignette(cx,cy,r0,r1,alpha){
  const v=g.createRadialGradient(cx,cy,r0,cx,cy,r1);
  v.addColorStop(0,'transparent');v.addColorStop(1,`rgba(0,0,0,${alpha})`);
  g.fillStyle=v;g.fillRect(0,0,LW,LH);
}

function skipHint(){
  g.save();g.fillStyle='rgba(255,255,255,0.4)';
  g.font='11px Impact,sans-serif';g.textAlign='center';
  g.fillText('TAP TO SKIP',LW/2,LH-10);g.restore();
}

function crosshair(cx,cy,r){
  g.save();g.strokeStyle='rgba(255,255,255,0.9)';g.lineWidth=3;
  g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.stroke();
  [[-r-15,0,-r+8,0],[r-8,0,r+15,0],[0,-r-15,0,-r+8],[0,r-8,0,r+15]].forEach(([x1,y1,x2,y2])=>{
    g.beginPath();g.moveTo(cx+x1,cy+y1);g.lineTo(cx+x2,cy+y2);g.stroke();
  });
  const d=r*.65;
  [[cx-d,cy-d,1,1],[cx+d,cy-d,-1,1],[cx-d,cy+d,1,-1],[cx+d,cy+d,-1,-1]].forEach(([bx,by,sx,sy])=>{
    g.beginPath();g.moveTo(bx+sx*14,by);g.lineTo(bx,by);g.lineTo(bx,by+sy*14);g.stroke();
  });
  g.restore();
}

// Piss stream
function drawPissStream(){
  if(piss<=0)return;
  const pct=piss/100;
  const sx=DOG_X+150,sy=DOG_Y+95,ex=HYD_X+10,ey=HYD_Y+100;
  const cpx=(sx+ex)/2+12,cpy=(sy+ey)/2+18;
  g.save();
  g.shadowColor='#FFD700';g.shadowBlur=14;
  g.strokeStyle=`rgba(255,205,0,${0.7+pct*.25})`;
  g.lineWidth=5+pct*7;g.lineCap='round';
  g.beginPath();g.moveTo(sx,sy);g.quadraticCurveTo(cpx,cpy,ex,ey);g.stroke();
  g.strokeStyle='rgba(255,255,180,0.45)';g.lineWidth=2;
  g.beginPath();g.moveTo(sx,sy);g.quadraticCurveTo(cpx,cpy,ex,ey);g.stroke();
  g.shadowBlur=0;
  const pr=8+pct*34;
  g.fillStyle='rgba(255,195,0,0.4)';
  g.beginPath();g.ellipse(HYD_X+18,HYD_Y+108,pr,pr*.3,0,0,Math.PI*2);g.fill();
  g.restore();
}

function drawParticles(){
  g.save();g.shadowColor='#FFD700';g.shadowBlur=5;
  particles.forEach(p=>{
    const a=Math.max(0,1-p.age/p.life);
    g.globalAlpha=a*.85;g.fillStyle='#FFD700';
    g.beginPath();g.arc(p.x,p.y,p.r*a,0,Math.PI*2);g.fill();
  });
  g.globalAlpha=1;g.shadowBlur=0;g.restore();
}

function drawPissMeter(){
  const bx=14,by=LH-60,bw=LW*.41,bh=26;
  g.save();
  g.font='bold 13px Impact,sans-serif';g.fillStyle='#FFD700';
  g.shadowColor='#000';g.shadowBlur=4;g.fillText('PISS METER',bx,by-9);g.shadowBlur=0;
  g.fillStyle='rgba(0,0,0,0.7)';g.beginPath();g.roundRect(bx-3,by-3,bw+6,bh+6,8);g.fill();
  g.fillStyle='#110800';g.beginPath();g.roundRect(bx,by,bw,bh,6);g.fill();
  if(piss>0){
    const pct=piss/100;
    g.fillStyle=`hsl(${44-pct*10},100%,52%)`;
    g.beginPath();g.roundRect(bx,by,bw*pct,bh,6);g.fill();
    g.fillStyle='rgba(255,255,255,0.28)';
    g.beginPath();g.roundRect(bx,by,bw*pct,bh*.42,4);g.fill();
  }
  g.strokeStyle='rgba(255,255,255,0.6)';g.lineWidth=2;
  g.beginPath();g.roundRect(bx,by,bw,bh,6);g.stroke();
  g.restore();
}

function drawWardenBar(){
  const pct=Math.max(0,(cleanerX-W_ARRIVE)/(W_START-W_ARRIVE));
  const bx=14,by=LH-96,bw=LW*.41,bh=16;
  g.save();
  g.font='13px Impact,sans-serif';g.fillStyle='#ff8c00';
  g.shadowColor='#000';g.shadowBlur=3;g.fillText('🚨 WARDEN DISTANCE',bx,by-6);g.shadowBlur=0;
  g.fillStyle='rgba(0,0,0,0.65)';g.beginPath();g.roundRect(bx-2,by-2,bw+4,bh+4,5);g.fill();
  g.fillStyle='#180800';g.beginPath();g.roundRect(bx,by,bw,bh,4);g.fill();
  if(pct>0){
    g.fillStyle=pct>.5?'#44dd22':pct>.25?'#ffdd00':'#ff2200';
    g.beginPath();g.roundRect(bx,by,bw*pct,bh,4);g.fill();
  }
  g.strokeStyle='rgba(255,255,255,0.5)';g.lineWidth=1.5;
  g.beginPath();g.roundRect(bx,by,bw,bh,4);g.stroke();
  g.restore();
}

function drawTapFast(){
  const pulse=.5+Math.abs(Math.sin(t*12))*.5;
  g.save();g.globalAlpha=pulse;g.textAlign='center';
  g.font='bold 19px Impact,sans-serif';
  g.strokeStyle='#000';g.lineWidth=4;
  g.strokeText('TAP FAST!   TAP FAST!   TAP FAST!',LW*.72,LH-16);
  g.fillStyle='#fff';g.fillText('TAP FAST!   TAP FAST!   TAP FAST!',LW*.72,LH-16);
  g.restore();
}

function tapReplay(msg){
  if(resultTimer<.5)return;
  const pulse=.4+Math.abs(Math.sin(resultTimer*5))*.6;
  g.save();g.globalAlpha=pulse;g.textAlign='center';
  g.font='bold 24px Impact,sans-serif';
  g.strokeStyle='#000';g.lineWidth=5;g.strokeText(msg,LW/2,LH-12);
  g.fillStyle='#fff';g.fillText(msg,LW/2,LH-12);g.restore();
}

// ── Render states ──────────────────────────────

function renderTitle(){
  // Full title image stretched to canvas
  spr('title', 0, 0, LW, LH);
  // Pulse the tap area
  if(Math.sin(t*3.5)<-0.1){
    g.fillStyle='rgba(0,0,0,0.85)';
    g.fillRect(LW*.2, LH*.78, LW*.6, LH*.16);
  }
  // Level badge
  if(diff>1.0){
    const lvl=Math.round((diff-1)/.15)+1;
    g.save();g.fillStyle='rgba(180,0,0,.88)';
    g.beginPath();g.roundRect(LW-145,8,137,34,8);g.fill();
    g.font='bold 13px Impact,sans-serif';g.fillStyle='#fff';g.textAlign='center';
    g.fillText(`🔥 LEVEL ${lvl}`,LW-76,29);g.restore();
  }
}

function renderCinEyes(){
  // Dog eyes close-up — use dog_idle zoomed right in, filling screen with fur feel
  g.fillStyle='#3a2010';g.fillRect(0,0,LW,LH);

  // Zoom in on the face portion of dog_idle
  const zoom=1+t*.25;
  const [sx,sy,sw,sh]=SP.dog_idle;
  // Focus on top portion (face area = top ~55% of sprite)
  const faceH=sh*.58, faceY=sy;
  g.save();
  g.translate(LW/2,LH/2);g.scale(zoom,zoom);
  g.drawImage(sheet,sx,faceY,sw,faceH,-LW/2,-LH/2,LW,LH);
  g.restore();

  vignette(LW/2,LH/2,LH*.2,LH*.8,.6);

  // "TARGET LOCKED!" bar at top
  const a=Math.min(1,t/.4);
  g.save();g.globalAlpha=a;
  g.fillStyle='#111';g.fillRect(0,0,LW,44);
  lbl('TARGET LOCKED!',LW/2,34,'#ff3333','#000',28);
  g.restore();
  skipHint();
}

function renderCinHydrant(){
  // Street bg
  spr('bg',0,0,LW,LH);
  g.fillStyle='rgba(0,0,0,0.2)';g.fillRect(0,0,LW,LH);

  // Zoom in on hydrant to fill screen
  const zoom=Math.min(1+t*2.5,6.0);
  const [sx,sy,sw,sh]=SP.hydrant;
  // Hydrant sits in centre of its sprite panel
  g.save();
  g.translate(LW/2,LH/2);g.scale(zoom,zoom);
  g.drawImage(sheet,sx,sy,sw,sh,-LW/2,-LH/2,LW,LH);
  g.restore();

  const r=Math.max(22,88-t*46);
  crosshair(LW/2,LH/2,r);
  vignette(LW/2,LH/2,70,LH,.8);
  skipHint();
}

function renderCinWalk(){
  spr('bg',0,0,LW,LH);

  // Hydrant at game position
  const hydW=80, hydH=(SP.hydrant[3]/SP.hydrant[2])*hydW;
  spr('hydrant',HYD_X,HYD_Y,hydW,hydH);

  // Dashed arrow dog→hydrant
  if(dogWalkX<DOG_X-20){
    g.save();g.strokeStyle='rgba(255,255,255,.8)';g.lineWidth=2.5;g.setLineDash([12,8]);
    g.beginPath();g.moveTo(dogWalkX+120,DOG_Y+80);g.lineTo(HYD_X+10,HYD_Y+60);g.stroke();
    g.setLineDash([]);
    g.fillStyle='rgba(255,255,255,.85)';
    g.save();g.translate(HYD_X+6,HYD_Y+56);g.rotate(-0.4);
    g.beginPath();g.moveTo(0,0);g.lineTo(-13,8);g.lineTo(-11,-8);g.fill();
    g.restore();g.restore();
  }

  // Walking dog — bob
  const bY=Math.sin(legPhase)*4;
  const dw=120, dh=(SP.dog_walk[3]/SP.dog_walk[2])*dw;
  spr('dog_walk',dogWalkX,DOG_Y+20+bY,dw,dh);

  // GO! label
  g.save();g.globalAlpha=Math.min(1,t/.3);
  lbl('GO!',LW*.75,130,'#FFD700','#222',72);
  g.textAlign='center';g.font='bold 20px Impact,sans-serif';
  g.strokeStyle='#000';g.lineWidth=4;g.strokeText('APPROACH THE HYDRANT',LW*.75,168);
  g.fillStyle='#fff';g.fillText('APPROACH THE HYDRANT',LW*.75,168);g.restore();
  skipHint();
}

function renderCinPeeNow(){
  spr('bg',0,0,LW,LH);

  // Dog + hydrant in pee position
  const dw=160, dh=(SP.dog_pee[3]/SP.dog_pee[2])*dw;
  spr('dog_pee',DOG_X-10,DOG_Y,dw,dh);
  const hw=80, hh=(SP.hydrant[3]/SP.hydrant[2])*hw;
  spr('hydrant',HYD_X,HYD_Y,hw,hh);

  // Flash overlay
  const fa=Math.max(0,.85-t*2.8);
  g.fillStyle=`rgba(255,250,200,${fa})`;g.fillRect(0,0,LW,LH);

  // PEE NOW! text slam
  const popS=1+Math.max(0,.45-t)*.9;
  g.save();g.translate(LW*.66,LH*.36);g.scale(popS,popS);g.textAlign='center';
  g.font='bold 86px Impact,Arial Black,sans-serif';
  g.fillStyle='#882200';g.fillText('PEE NOW!',3,3);
  g.lineWidth=12;g.strokeStyle='#111';g.strokeText('PEE NOW!',0,0);
  g.fillStyle='#FFD700';g.fillText('PEE NOW!',0,0);
  g.restore();
  skipHint();
}

function renderPee(){
  g.save();
  if(shakeAmt>0) g.translate((Math.random()-.5)*3,(Math.random()-.5)*3);

  // Background
  spr('bg',0,0,LW,LH);

  // Hydrant
  const hw=80,hh=(SP.hydrant[3]/SP.hydrant[2])*hw;
  spr('hydrant',HYD_X,HYD_Y,hw,hh);

  // Piss effects
  drawPissStream();
  drawParticles();

  // Dog peeing
  const dw=165,dh=(SP.dog_pee[3]/SP.dog_pee[2])*dw;
  spr('dog_pee',DOG_X-10,DOG_Y-5,dw,dh);

  // Warden walks in from right — flip so he faces left (toward dog)
  const ww=160,wh=(SP.warden_walk[3]/SP.warden_walk[2])*ww;
  spr('warden_walk',cleanerX-ww,DOG_Y+5,ww,wh,true);

  // HUD
  drawWardenBar();
  drawPissMeter();
  drawTapFast();

  // "PEE!" label
  g.save();g.font='bold 36px Impact,sans-serif';g.textAlign='left';
  g.strokeStyle='#000';g.lineWidth=5;g.strokeText('PEE!',14,44);
  g.fillStyle='#ff9900';g.fillText('PEE!',14,44);g.restore();

  g.restore();
}

function renderWin(){
  // Full win scene
  spr('win',0,0,LW,LH);

  // Animate dog running across on top (moves right to left)
  if(escapeX>-200){
    const rw=200,rh=(SP.dog_run[3]/SP.dog_run[2])*rw;
    spr('dog_run',escapeX,DOG_Y+10,rw,rh,true);

    // Speed lines
    g.save();g.strokeStyle='rgba(255,255,255,0.35)';g.lineWidth=2;
    for(let i=0;i<6;i++){
      const lx=escapeX+rw+8+i*22,ly=DOG_Y+22+i*9;
      g.beginPath();g.moveTo(lx,ly);g.lineTo(lx+36,ly+4);g.stroke();
    }
    g.restore();
  }
  tapReplay('TAP TO PLAY AGAIN');
}

function renderLose(){
  spr('lose',0,0,LW,LH);
  tapReplay('TAP TO TRY AGAIN');
}

// ── Main loop ──────────────────────────────────
function loop(ts){
  dt=Math.min((ts-last)/1000,.05);last=ts;t+=dt;
  update();
  applyScale();
  g.clearRect(0,0,LW,LH);

  if(!sheet.complete||!sheet.naturalWidth){
    g.fillStyle='#111';g.fillRect(0,0,LW,LH);
    g.fillStyle='#FFD700';g.textAlign='center';
    g.font='bold 18px Impact,sans-serif';
    g.fillText('LOADING...',LW/2,LH/2);
    requestAnimationFrame(loop);return;
  }

  if(state===S.TITLE)            renderTitle();
  else if(state===S.CIN_EYES)    renderCinEyes();
  else if(state===S.CIN_HYDRANT) renderCinHydrant();
  else if(state===S.CIN_WALK)    renderCinWalk();
  else if(state===S.CIN_PEENOW)  renderCinPeeNow();
  else if(state===S.PEE)         renderPee();
  else if(state===S.WIN)         renderWin();
  else if(state===S.LOSE)        renderLose();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
